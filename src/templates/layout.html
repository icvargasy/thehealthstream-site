<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — The Healthstream</title>
  <meta name="description" content="{{meta_description}}">
  <link rel="icon" type="image/png" href="{{base_path}}assets/favicon_light.png" id="favicon">
  <link rel="stylesheet" href="{{base_path}}style.css">
</head>
<body>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const theme = savedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.body.setAttribute('data-theme', theme);
      
      // Update favicon immediately
      const favicon = document.getElementById('favicon');
      if (favicon) {
        favicon.href = `{{base_path}}assets/favicon_${theme}.png`;
      }
    })();
  </script>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Global Header -->
  <header class="global-header">
    <div class="header-brand-container">
      <button class="icon-button" id="sidebar-toggle" aria-label="Toggle Sidebar" aria-expanded="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <a href="{{base_path}}index.html" class="header-brand">
        <picture>
          <source srcset="{{base_path}}assets/logo_only_dark.png" media="(prefers-color-scheme: dark)">
          <img src="{{base_path}}assets/logo_only_light.png" alt="The Healthstream Logo" id="brand-logo">
        </picture>
        <span class="brand-text">The Healthstream</span>
      </a>
    </div>

    <div class="header-actions">
      <button class="icon-button" id="theme-toggle" aria-label="Toggle Theme">
        <!-- Sun icon -->
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon icon -->
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- Two-Pane Dashboard Grid -->
  <div id="dashboard-container">
    
    <!-- Collapsible Sidebar -->
    <aside id="sidebar" aria-label="Site Navigation">
      
      <!-- Primary Links -->
      <nav class="sidebar-section">
        <ul class="nav-list">
          <li>
            <a href="{{base_path}}index.html" class="nav-link {{nav_active_feed}}" id="nav-feed">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="9"></rect>
                <rect x="14" y="3" width="7" height="5"></rect>
                <rect x="14" y="12" width="7" height="9"></rect>
                <rect x="3" y="16" width="7" height="5"></rect>
              </svg>
              {{label_nav_home}}
            </a>
          </li>
          <li>
            <a href="{{base_path}}backlog.html" class="nav-link {{nav_active_backlog}}" id="nav-backlog">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
              </svg>
              {{label_nav_backlog}}
            </a>
          </li>
          <li>
            <a href="{{base_path}}vocabulary.html" class="nav-link {{nav_active_vocab}}" id="nav-vocab">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
              </svg>
              {{label_nav_vocabulary}}
            </a>
          </li>
          <li>
            <a href="{{base_path}}about.html" class="nav-link {{nav_active_about}}" id="nav-about">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
              </svg>
              {{label_nav_about}}
            </a>
          </li>
          <li>
            <a href="{{base_path}}contact.html" class="nav-link {{nav_active_contact}}" id="nav-contact">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
              {{label_nav_contact}}
            </a>
          </li>
        </ul>
      </nav>

      <!-- Decoded Category Accordions -->
      <nav class="sidebar-section">
        <div class="sidebar-title">Decoded Networks</div>
        
        <!-- Biology Accordion -->
        <div class="accordion-group" id="group-biology">
          <button class="accordion-trigger" aria-controls="content-biology" aria-expanded="true">
            <span>{{label_category_biology}}</span>
            <svg class="chevron" width="16" height="16" viewBox="0 0 24 24">
              <path d="M7 10l5 5 5-5z"></path>
            </svg>
          </button>
          <div class="accordion-content" id="content-biology">
            <ul class="nav-list">
              {{sidebar_links_biology}}
            </ul>
          </div>
        </div>

        <!-- Lifestyle Accordion -->
        <div class="accordion-group" id="group-lifestyle">
          <button class="accordion-trigger" aria-controls="content-lifestyle" aria-expanded="true">
            <span>{{label_category_lifestyle}}</span>
            <svg class="chevron" width="16" height="16" viewBox="0 0 24 24">
              <path d="M7 10l5 5 5-5z"></path>
            </svg>
          </button>
          <div class="accordion-content" id="content-lifestyle">
            <ul class="nav-list">
              {{sidebar_links_lifestyle}}
            </ul>
          </div>
        </div>

        <!-- Books Accordion -->
        <div class="accordion-group" id="group-book">
          <button class="accordion-trigger" aria-controls="content-book" aria-expanded="true">
            <span>{{label_category_book}}</span>
            <svg class="chevron" width="16" height="16" viewBox="0 0 24 24">
              <path d="M7 10l5 5 5-5z"></path>
            </svg>
          </button>
          <div class="accordion-content" id="content-book">
            <ul class="nav-list">
              {{sidebar_links_book}}
            </ul>
          </div>
        </div>
      </nav>

      <!-- Bottom spacer for visual balance -->
      <div class="sidebar-section" style="margin-top: auto; border-bottom: none;"></div>

    </aside>

    <!-- Reading Pane -->
    <main id="reading-pane" tabindex="-1">
      <div class="content-container fade-in">
        {{content}}
      </div>
    </main>

  </div>

  <script src="{{base_path}}app.js"></script>
</body>
</html>
